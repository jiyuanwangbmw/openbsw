[global]
excludes = [
  "**/3rdparty/*/**",
  "**/Doxyfile",
  "**/Makefile",
  "*.*-format",
  "*.S",
  "*.cmm",
  "*.css",
  "*.dld",
  "*.gdb",
  "*.gif",
  "*.gitignore",
  "*.html",
  "*.josh",
  "*.json",
  "*.png",
  "*.rb",
  "*.s",
  "*.spec",
  "LICENSE",
  "admin/cmake/CodeCoverage.cmake",
  "docker/**",
  "tools/clang-format-wrapper",
  "tools/puncover_tool/**",
]

[formatter.cpp]
command = "tools/clang-format-wrapper"
options = [ "--style=file", "-i" ]
includes = [ "*.c", "*.cc", "*.cpp", "*.h", "*.hh", "*.hpp" ]

[formatter.cmake]
command = "cmake-format"
options = [ "-i" ]
includes = [ "**/CMakeLists.txt", "*.cmake", "CMakeLists.txt" ]

[formatter.copyright]
command = "python3"
options = [
  "tools/cr_checker/cr_checker.py",
  "-t", "tools/cr_checker/templates.ini",
  "-c", "tools/cr_checker/config.json",
  "--exclusion-file", "tools/cr_checker/exclusions.txt",
  "--fix",
]
includes = [
  "*.c", "*.cc", "*.cpp", "*.h", "*.hh", "*.hpp",
  "*.cmake", "**/CMakeLists.txt",
  "*.py", "*.sh",
  "*.toml", "*.yml", "*.yaml", "*.ini",
  "*.rst", "*.md", "*.puml",
]
