name: Copyright check

on: [merge_group, push, pull_request]

permissions:
  contents: read

jobs:
  copyright-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run copyright checker
        run: |
          python3 tools/cr_checker/cr_checker.py \
            -t tools/cr_checker/templates.ini \
            -c tools/cr_checker/config.json \
            --exclusion-file tools/cr_checker/exclusions.txt \
            .
